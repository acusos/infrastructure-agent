monitor:
  poll_interval: 5
  containers: []
  resource_thresholds:
    cpu: 95
    memory: 95

servers:
  - name: droneworks
    host: 192.168.20.111
    ports: [22, 80, 443]
    timeout: 5
  - name: kali
    host: 192.168.20.120
    ports: [22, 80, 443, 8080, 8081]
    timeout: 5
  - name: vmserver
    host: 192.168.20.84
    ports: [22, 5901]
    timeout: 5
  - name: littlebox
    host: 192.168.20.82
    ports: [22, 80, 5900, 5901, 5902]
    timeout: 5
  - name: ai
    host: 192.168.20.116
    ports: [22, 8080]
    timeout: 5
  - name: aiclient
    host: 192.168.20.112
    ports: [22, 8000, 8002, 11434]
    timeout: 5
  - name: crm
    host: 192.168.20.109
    ports: [22, 80, 443]
    timeout: 5
  - name: droneworks_au
    host: 139.216.68.122
    ports: [22, 80, 443]
    timeout: 5

shellys:
  - name: shelly_1pm
    host: 192.168.20.95
    timeout: 10

health:
  endpoints:
    - name: app
      url: http://localhost:8000/health
      interval: 10
  tcp_checks:
    - host: localhost
      port: 5432
      interval: 15

recovery:
  max_restarts: 3
  restart_cooldown: 60
  restart_timeout: 30

llm:
  base_url: http://192.168.20.116:4000
  model: gpt-4
  temperature: 0.3

memory:
  qdrant:
    host: qdrant
    port: 6333
    collection: infra_events

docker:
  socket: /var/run/docker.sock
  network: infra_network

dashboard:
  host: 0.0.0.0
  port: 8000
